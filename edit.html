  }

  function collect() {
    document.querySelectorAll("[data-k]").forEach(function (n) {
      let v = n.value;
      if (n.dataset.k === "eventDate" && v) v = new Date(v).toISOString();
      inv[n.dataset.k] = v;
    });
    inv.program = Array.prototype.map.call(document.querySelectorAll(".prog-edit"), function (r) {
      return { time: r.querySelector(".p-time").value, label: r.querySelector(".p-label").value };
    }).filter(function (p) { return p.time || p.label; });
  }

  function bind() {
    document.querySelectorAll(".tpl-card").forEach(function (b) { b.addEventListener("click", function () { collect(); inv.template = b.dataset.tpl; saved = false; render(); }); });
    document.querySelectorAll(".toggle").forEach(function (b) { b.addEventListener("click", function () { collect(); inv[b.dataset.t] = !inv[b.dataset.t]; saved = false; render(); }); });
    const sel = document.querySelector('[data-k="lang"]');
    if (sel) sel.addEventListener("change", function () { collect(); saved = false; render(); });
    const ap = $("#addProg");
    if (ap) ap.addEventListener("click", function () { collect(); inv.program.push({ time: "", label: "" }); render(); });
    document.querySelectorAll(".p-del").forEach(function (b) { b.addEventListener("click", function () { collect(); inv.program.splice(+b.parentElement.dataset.i, 1); render(); }); });
    $("#save").addEventListener("click", function () {
      collect();
      saved = true;
      history.replaceState(null, "", location.pathname + "?d=" + App.encode(inv));
      render();
      window.scrollTo(0, document.body.scrollHeight);
    });
    const cl = $("#copyLink");
    if (cl) cl.addEventListener("click", function () { navigator.clipboard.writeText(guestLink()); cl.textContent = "✓"; });
  }

  render();
};

/* ===== لوحة التحكم (الأدمن) — احترافية مع سجل الدعوات ===== */
App.initAdmin = function () {
  const { THEMES, TIERS, LANG_NAMES, $, esc } = App;
  const root = $("#root");
  const PRICES = { vip: "٩٩,٠٠٠ د.ع", gold: "٦٥,٠٠٠ د.ع", classic: "٢٥,٠٠٠ د.ع" };
  const TIER_AR = { vip: "VIP", gold: "احترافي", classic: "عادي" };

  function loadReg() { try { return JSON.parse(localStorage.getItem("bq_invites") || "[]"); } catch (e) { return []; } }
  function saveReg(r) { localStorage.setItem("bq_invites", JSON.stringify(r)); }

  function loginView() {
    root.innerHTML = '<div class="center-page">' +
      '<div class="seal" style="width:80px;height:80px;background:rgba(233,192,94,.1);border:1px solid rgba(233,192,94,.4);color:#dfa93a">' + App.ic("lock", 32) + '</div>' +
      '<h1 class="display gold-text" style="font-size:30px;margin:16px 0 0">لوحة التحكم</h1>' +
      '<p style="font-size:13px;opacity:.6">بطاقتي VIP — الدخول بالرمز السري فقط</p>' +
      '<input id="pw" type="password" placeholder="رمز التحكم" dir="ltr" style="margin-top:22px;max-width:300px;text-align:center;border-radius:99px">' +
      '<button class="btn-gold" id="go" style="max-width:300px;margin-top:14px">دخول</button>' +
      '<p id="err" style="color:#f87171;font-size:13px;margin-top:14px"></p></div>';
    const pw = $("#pw");
    const go = function () {
      if (pw.value.trim() === App.ADMIN_CODE) mainView();
      else $("#err").textContent = "رمز التحكم غير صحيح";
    };
    $("#go").addEventListener("click", go);
    pw.addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });
  }

  function regRow(r, i) {
    const tc = r.tier === "vip" ? "#e9c05e" : r.tier === "gold" ? "#d9a941" : "#a8b0c0";
    const date = new Date(r.at).toLocaleDateString("ar-IQ", { day: "numeric", month: "short" });
    return '<div class="inv-row">' +
      '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">' +
        '<b style="color:#f2d998" dir="ltr">' + esc(r.code) + '</b>' +
        '<span class="badge" style="border-color:' + tc + ';color:' + tc + '">' + TIER_AR[r.tier] + ' · ' + PRICES[r.tier] + '</span>' +
        (r.name ? '<span style="font-size:11px;opacity:.7">' + esc(r.name) + '</span>' : "") +
        '<span style="font-size:10px;opacity:.5">' + date + '</span></div>' +
      '<div class="inv-actions">' +
        '<button class="btn-ghost sm" data-a="copy" data-i="' + i + '">' + App.ic("copy", 13) + ' نسخ رابط التعديل</button>' +
        '<a class="btn-ghost sm" target="_blank" rel="noreferrer" href="https://wa.me/' + (r.phone || "") + '?text=' + encodeURIComponent("أهلاً " + (r.name || "") + " 🤍\nهذا رابط تعديل دعوتك — افتحه واكتب معلومات حفلكم ثم اضغط حفظ:\n" + r.editUrl + "\n\nبطاقتي VIP") + '">' + App.ic("send", 13) + ' إرسال للزبون</a>' +
        '<button class="btn-ghost sm danger" data-a="del" data-i="' + i + '">' + App.ic("trash", 13) + ' حذف</button>' +
      '</div></div>';
  }

  function mainView() {
    const reg = loadReg();
    root.innerHTML = '<div class="edit-wrap" style="max-width:720px">' +
      '<header style="text-align:center;margin-bottom:26px">' +
        '<div class="seal" style="width:64px;height:64px;margin:0 auto 12px;background:rgba(233,192,94,.1);border:1px solid rgba(233,192,94,.4);color:#dfa93a">' + App.ic("crown", 28) + '</div>' +
        '<h1 class="display gold-text" style="font-size:28px;margin:0">لوحة التحكم</h1>' +
        '<p style="font-size:12px;opacity:.6;margin-top:6px">إجمالي الدعوات المُنشأة: ' + reg.length + '</p></header>' +
      '<section class="panel"><h2>' + App.ic("gem", 15) + ' إنشاء دعوة جديدة</h2>' +
        '<div class="grid2">' +
          '<label class="field"><span>كود الدعوة (بالإنكليزي، مثل ahmad-shilan)</span><input id="nCode" dir="ltr" placeholder="ahmad-shilan"></label>' +
          '<label class="field"><span>اسم الزبون</span><input id="nName" placeholder="أحمد"></label>' +
          '<label class="field"><span>رقم الزبون (واتساب)</span><input id="nPhone" dir="ltr" placeholder="9647501234567"></label>' +
          '<label class="field"><span>الفئة والسعر</span><select id="nTier">' +
            '<option value="vip">VIP — ٩٩,٠٠٠ د.ع — كل القوالب + موسيقى + اسم الضيف</option>' +
            '<option value="gold">احترافي — ٦٥,٠٠٠ د.ع — ٤ قوالب + موسيقى</option>' +
            '<option value="classic">عادي — ٢٥,٠٠٠ د.ع — قالبان</option></select></label>' +
          '<label class="field"><span>القالب الافتراضي</span><select id="nTpl"></select></label>' +
          '<label class="field"><span>لغة الدعوة</span><select id="nLang">' +
            Object.keys(LANG_NAMES).map(function (l) { return '<option value="' + l + '">' + LANG_NAMES[l] + '</option>'; }).join("") + '</select></label>' +
        '</div>' +
        '<button class="btn-gold" id="mk" style="margin-top:16px">أنشئ الدعوة</button>' +
        '<div id="createdBox"></div></section>' +
      '<section class="panel"><h2>' + App.ic("calendar", 15) + ' سجل دعواتي</h2><div id="reg">' +
        (reg.length ? reg.map(regRow).join("") : '<p style="text-align:center;opacity:.5;padding:20px 0;font-size:13px">لا توجد دعوات بعد — أنشئ أول دعوة من الأعلى</p>') +
      '</div><p style="font-size:10px;opacity:.45;margin-top:10px">السجل محفوظ في متصفحك هذا فقط — الروابط نفسها تعمل دائماً حتى لو مسحت السجل</p></section>' +
      '<section class="panel"><h2>' + App.ic("chat", 15) + ' طريقة العمل</h2>' +
        '<p style="font-size:13px;line-height:2.1;opacity:.8">1. أنشئ الدعوة واختر الفئة حسب ما دفع الزبون<br>2. أرسل <b style="color:#f2d998">رابط التعديل</b> للزبون بزر الإرسال<br>3. الزبون يكتب معلومات حفله ويحفظ — تصلك التفاصيل مع <b style="color:#f2d998">رابط الدعوة النهائي</b> على واتسابك تلقائياً<br>4. الرابط النهائي يوزعه الزبون على ضيوفه — ويقفل تلقائياً بعد الحفل بيومين</p></section></div>';

    const tplSel = $("#nTpl"), tierSel = $("#nTier");
    function fillTpl() {
      tplSel.innerHTML = TIERS[tierSel.value].templates.map(function (tid) {
        return '<option value="' + tid + '">' + THEMES[tid].names.ar + '</option>';
      }).join("");
    }
    fillTpl();
    tierSel.addEventListener("change", fillTpl);

    $("#mk").addEventListener("click", function () {
      let code = ($("#nCode").value || "").trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
      if (!code) code = "dawat-" + Math.random().toString(36).slice(2, 7);
      const inv = App.newInvite({ code: code, tier: tierSel.value, template: tplSel.value,
        lang: $("#nLang").value, customerName: $("#nName").value });
      const editUrl = location.origin + "/edit/" + code + "?d=" + App.encode(inv);
      const phone = ($("#nPhone").value || "").replace(/\D/g, "");
      const reg2 = loadReg();
      reg2.unshift({ code: code, name: $("#nName").value, phone: phone, tier: tierSel.value, editUrl: editUrl, at: Date.now() });
      saveReg(reg2);
      const waTxt = "أهلاً " + ($("#nName").value || "") + " 🤍\nهذا رابط تعديل دعوتك — افتحه واكتب معلومات حفلكم ثم اضغط حفظ:\n" + editUrl + "\n\nبطاقتي VIP";
      $("#createdBox").innerHTML = '<div class="created">' +
        '<p style="color:#34d399;font-weight:700;margin:0 0 10px">تم إنشاء الدعوة «' + esc(code) + '» — ' + TIER_AR[tierSel.value] + ' ' + PRICES[tierSel.value] + '</p>' +
        '<div class="linkrow"><span>رابط التعديل (للزبون):</span><code dir="ltr">' + editUrl + '</code><button id="cpE">نسخ</button></div>' +
        '<a class="btn-wa" style="margin-top:10px" target="_blank" rel="noreferrer" href="https://wa.me/' + phone + '?text=' + encodeURIComponent(waTxt) + '">' + App.ic("send", 15) + ' أرسل الرابط للزبون</a></div>';
      $("#cpE").addEventListener("click", function () { navigator.clipboard.writeText(editUrl); $("#cpE").textContent = "✓"; });
      const regBox = $("#reg");
      regBox.innerHTML = loadReg().map(regRow).join("");
      bindReg();
    });
    bindReg();

    function bindReg() {
      root.querySelectorAll("[data-a]").forEach(function (b) {
        b.addEventListener("click", function () {
          const i = +b.dataset.i, r = loadReg();
          if (b.dataset.a === "copy") { navigator.clipboard.writeText(r[i].editUrl); b.innerHTML = "✓ نُسخ"; }
          if (b.dataset.a === "del") { if (confirm("حذف «" + r[i].code + "» من السجل؟ (الرابط نفسه يبقى شغالاً)")) { r.splice(i, 1); saveReg(r); mainView(); } }
        });
      });
    }
  }

  loginView();
};

App.initEdit();
</script>
