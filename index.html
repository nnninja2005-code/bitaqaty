/* ===== ترميز الدعوة داخل الرابط (بدون سيرفر) ===== */
App.encode = function (inv) {
  const json = JSON.stringify(inv);
  return "v1." + btoa(unescape(encodeURIComponent(json))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
};
App.decode = function (hash) {
  let s = String(hash || "").replace(/^#/, "");
  if (!s.startsWith("v1.")) return null;
  s = s.slice(3).replace(/-/g, "+").replace(/_/g, "/");
  try { return JSON.parse(decodeURIComponent(escape(atob(s)))); } catch { return null; }
};
App.newInvite = function (p) {
  return { code: p.code || "", tier: p.tier || "classic", template: p.template || "rose",
    lang: p.lang || "ar", customerName: p.customerName || "", groom: "", bride: "",
    phrase: "", dua: "", eventDate: "", dateText: "", timeText: "", showCountdown: true,
    venueName: "", venueAddress: "", mapsUrl: "", program: [], musicUrl: "",
    rsvpEnabled: true, rsvpPhone: "" };
};
App.isExpired = function (inv) {
  if (!inv.eventDate) return false;
  return Date.now() > new Date(inv.eventDate).getTime() + 2 * 864e5;
};
App.demoInvite = function (code) {
  const m = { "demo-zerin": ["zerin","ar","vip"], "demo-royal": ["royal","ar","gold"],
    "demo-rose": ["rose","ar","classic"], "demo-starlit": ["starlit","ar","gold"],
    "demo-garden": ["garden","ar","classic"], "demo-zerin-bad": ["zerin","bad","vip"],
    "demo-zerin-sor": ["zerin","sor","vip"] };
  if (!m[code]) return null;
  const [template, lang, tier] = m[code];
  const d = new Date(); d.setDate(d.getDate() + 30); d.setHours(19, 0, 0, 0);
  const names = { ar: ["آلان","دلڤين"], bad: ["ئالان","دلڤین"], sor: ["ئالان","دلڤین"] };

    sor: [["7:00","پێشوازی میوانان"],["8:30","هاتنی بووک و زاوا"],["10:00","بڕینی کێک"]] };
  const inv = App.newInvite({ code, tier, template, lang });
  inv.groom = names[lang][0]; inv.bride = names[lang][1];
  inv.eventDate = d.toISOString();
  inv.venueName = lang === "ar" ? "قاعة زانا الملكية" : "هۆلا زانا";

};

    (inv.program && inv.program.length ? card('<h2 class="sec-title" style="color:' + t.accent + '">' + d.programTitle + '</h2>' +
      '<div class="prog">' + inv.program.map(function (p) { return '<div class="prog-row"><span class="prog-time" style="background:' + t.soft + ';color:' + t.accent + ';border:1px solid ' + t.border + '">' + esc(p.time) + '</span><span style="font-size:14px">' + esc(p.label) + '</span></div>'; }).join("") + '</div>') : "") +
    '<section class="reveal" style="text-align:center"><p class="naskh" style="max-width:360px;margin:0 auto;font-size:15px;line-height:1.9;opacity:.9">' + dua + '</p></section>' +
    (inv.rsvpEnabled && inv.rsvpPhone ? card('<div style="text-align:center"><h2 class="sec-title" style="color:' + t.accent + ';margin-bottom:6px">' + d.rsvpTitle + '</h2>' +
      '<p style="font-size:13px;opacity:.85">' + d.rsvpBody + '</p>' +
      '<a class="btn" style="background:' + t.accent + ';color:#1c1508;margin-top:14px;font-weight:800" target="_blank" rel="noreferrer" href="https://wa.me/' + inv.rsvpPhone + '?text=' + encodeURIComponent(d.rsvpMessage + " — " + (inv.groom || "") + " " + d.and + " " + (inv.bride || "") + " 💍" + (guest ? "\n(" + guest + ")" : "")) + '">' + d.rsvpButton + '</a></div>') : "") +
    '<footer class="reveal" style="text-align:center;padding:16px 0 30px">' +
      '<p style="font-size:12px;opacity:.6">' + d.withLove + " — " + groom + " " + d.and + " " + bride + '</p>' +
      '<a href="/" style="color:' + t.accent + ';font-size:11px;opacity:.5">بطاقتي VIP · bitaqaty.vip</a></footer>');
  root.appendChild(main);

  cover.addEventListener("click", function () {
    cover.classList.add("opened");
    particles(root, t, 18);
    setTimeout(function () {
      var nodes = document.querySelectorAll(".reveal");
      nodes.forEach(function (n, i) { setTimeout(function () { n.classList.add("shown"); }, i * 130); });
    }, 700);
    setTimeout(function () { cover.remove(); }, 2400);
    if (inv.musicUrl) {
      const id = ytId(inv.musicUrl);
      let audio = null, ifr = null, muted = false;
      if (id) {
        ifr = el("iframe", { class: "yt-hidden", allow: "autoplay", src: "https://www.youtube.com/embed/" + id + "?autoplay=1&loop=1&playlist=" + id });
        document.body.appendChild(ifr);
      } else {
        audio = el("audio", { src: inv.musicUrl, loop: "" });
        document.body.appendChild(audio);
        audio.play().catch(function () {});
      }
      const btn = el("button", { class: "music-btn", style: "background:" + t.soft + ";border:1px solid " + t.border + ";color:" + t.accent }, "🎵");
      btn.addEventListener("click", function () {
        muted = !muted;
        btn.textContent = muted ? "🔇" : "🎵";
        if (audio) { audio.muted = muted; if (!muted) audio.play().catch(function () {}); }
        if (ifr) { if (muted) ifr.remove(); else document.body.appendChild(ifr); }
      });
      document.body.appendChild(btn);
    }
    const cd = $("#cd");
    if (cd) countdown(inv.eventDate, d, cd, t.accent, t.border);
  });
};

/* ===== صفحة التعديل (الزبون) — بدون سيرفر ===== */
App.initEdit = function () {
  const { THEMES, TIERS, LANG_NAMES, $, esc, dict } = App;
  const root = $("#root");
  let inv = App.decode(location.hash);
  if (!inv) {
    root.innerHTML = '<div class="center-page"><div style="font-size:56px">🔍</div><p style="font-size:17px">' + dict("ar").notFound + '</p></div>';
    return;
  }
  let saved = false;

  function guestLink() {
    return location.origin + "/d/" + encodeURIComponent(inv.code || "dawat") + "#" + App.encode(inv);
  }
  function waLink() {
    const t = THEMES[inv.template];
    const lines = ["✨ دعوة جديدة جاهزة — بطاقتي VIP", "الكود: " + inv.code, "الفئة: " + (inv.tier || "").toUpperCase(),
      "القالب: " + t.names.ar, "العريس: " + inv.groom, "العروس: " + inv.bride,
      "التاريخ: " + (inv.dateText || inv.eventDate), "الوقت: " + inv.timeText,
      "القاعة: " + inv.venueName, "العنوان: " + inv.venueAddress,
      inv.mapsUrl ? "الخريطة: " + inv.mapsUrl : "", inv.musicUrl ? "الموسيقى: " + inv.musicUrl : "",
      "", "رابط الدعوة النهائي:", guestLink()].filter(Boolean);
    return "https://wa.me/" + App.WA_FALLBACK + "?text=" + encodeURIComponent(lines.join("\n"));
  }

  function render() {
    const d = dict(inv.lang);
    const f = TIERS[inv.tier] || TIERS.classic;
    const tierColor = inv.tier === "vip" ? "#e9c05e" : inv.tier === "gold" ? "#d9a941" : "#a8b0c0";
    const inp = function (name, label, val, ph, dir) {
      return '<label class="field"><span>' + label + '</span><input data-k="' + name + '" value="' + esc(val) + '" placeholder="' + esc(ph || "") + '" ' + (dir ? 'dir="' + dir + '"' : "") + '></label>';
    };
    const area = function (name, label, val, ph) {
      return '<label class="field"><span>' + label + '</span><textarea data-k="' + name + '" rows="2" placeholder="' + esc(ph || "") + '">' + esc(val) + '</textarea></label>';
    };
    const tog = function (name, label, on) {
      return '<button type="button" class="toggle" data-t="' + name + '"><span>' + label + '</span><i class="' + (on ? "on" : "") + '"></i></button>';
    };

    root.innerHTML = '<div class="edit-wrap">' +
      '<header style="text-align:center;margin-bottom:28px">' +
        '<div class="seal" style="width:64px;height:64px;font-size:24px;margin:0 auto 12px;background:rgba(233,192,94,.1);border:1px solid rgba(233,192,94,.4)">💍</div>' +
        '<h1 class="display gold-text" style="font-size:28px;margin:0">' + d.editTitle + '</h1>' +
        '<p style="font-size:13px;opacity:.7;margin:8px 0 12px">' + d.editSubtitle + '</p>' +
        '<span style="border:1px solid ' + tierColor + ';color:' + tierColor + ';border-radius:99px;padding:4px 16px;font-size:11px;font-weight:800">' + (inv.tier || "").toUpperCase() + ' · ' + esc(inv.code) + '</span></header>' +
      '<section class="panel"><h2>' + d.secTemplate + '</h2><div class="tpl-grid">' +
        f.templates.map(function (tid) { const t = THEMES[tid]; const act = inv.template === tid;
          return '<button type="button" class="tpl-card' + (act ? " act" : "") + '" data-tpl="' + tid + '" style="background:' + t.bg + ';color:' + t.text + ';border-color:' + (act ? t.accent : "transparent") + '">' +
            '<div style="font-size:24px">' + t.emoji + '</div><div style="font-size:11px;font-weight:700;margin-top:4px">' + t.names[inv.lang] + '</div></button>'; }).join("") +
      '</div></section>' +
      '<section class="panel"><h2>' + d.secBasics + '</h2>' +
        '<label class="field"><span>' + d.fLang + '</span><select data-k="lang">' +
          Object.keys(LANG_NAMES).map(function (l) { return '<option value="' + l + '" ' + (inv.lang === l ? "selected" : "") + '>' + LANG_NAMES[l] + '</option>'; }).join("") +
        '</select></label>' +
        '<div class="grid2">' + inp("groom", d.fGroom, inv.groom) + inp("bride", d.fBride, inv.bride) + '</div>' +
        area("phrase", d.fPhrase, inv.phrase, d.defaultPhrase) + '</section>' +
      '<section class="panel"><h2>' + d.secDateTime + '</h2>' +
        '<label class="field"><span>' + d.fEventDate + '</span><input type="datetime-local" data-k="eventDate" value="' + (inv.eventDate ? inv.eventDate.slice(0, 16) : "") + '"></label>' +
        '<div class="grid2">' + inp("dateText", d.fDateText, inv.dateText, "يوم الجمعة، ١٥ آب ٢٠٢٦") + inp("timeText", d.fTimeText, inv.timeText, "الساعة ٧ مساءً") + '</div>' +
        tog("showCountdown", d.fCountdown, inv.showCountdown) + '</section>' +
      '<section class="panel"><h2>' + d.secTexts + '</h2>' + area("dua", d.fDua, inv.dua, d.defaultDua) + '</section>' +
      '<section class="panel"><h2>' + d.secVenue + '</h2>' +
        inp("venueName", d.fVenue, inv.venueName) + inp("venueAddress", d.fAddress, inv.venueAddress) +
        inp("mapsUrl", d.fMaps, inv.mapsUrl, "https://maps.google.com/...", "ltr") + '</section>' +
      (f.program ? '<section class="panel"><h2>' + d.secProgram + '</h2><div id="prog">' +
        inv.program.map(function (p, i) {
          return '<div class="prog-edit" data-i="' + i + '"><input class="p-time" value="' + esc(p.time) + '" placeholder="' + d.timePh + '" style="width:100px;text-align:center"><input class="p-label" value="' + esc(p.label) + '" placeholder="' + d.labelPh + '"><button type="button" class="p-del">✕</button></div>'; }).join("") +
        '</div><button type="button" class="btn-ghost" id="addProg">' + d.addItem + '</button></section>' : "") +
      (f.music ? '<section class="panel"><h2>' + d.secMusic + '</h2>' +
        inp("musicUrl", d.fMusic, inv.musicUrl, "https://youtube.com/...", "ltr") +
        '<p style="font-size:11px;opacity:.6;margin:4px 0 0">' + d.musicHint + '</p></section>' : "") +
      '<section class="panel"><h2>' + d.secRsvp + '</h2>' + tog("rsvpEnabled", d.fRsvpOn, inv.rsvpEnabled) +
        (inv.rsvpEnabled ? inp("rsvpPhone", d.fRsvpPhone, inv.rsvpPhone, "9647501234567", "ltr") + '<p style="font-size:11px;opacity:.6;margin:4px 0 0">' + d.phoneHint + '</p>' : "") + '</section>' +
      '<div class="actions">' +
        '<button type="button" class="btn-gold" id="save">' + (saved ? "✓ " + d.savedOk : d.saveBtn) + '</button>' +
        (saved ? '<div class="linkrow"><span>🔗</span><code dir="ltr">' + guestLink() + '</code><button type="button" id="copyLink">نسخ</button></div>' +
          '<a class="btn-wa" target="_blank" rel="noreferrer" href="' + waLink() + '">' + d.sendWA + '</a>' +
          '<a class="btn-ghost" style="text-align:center" target="_blank" rel="noreferrer" href="' + guestLink() + '">' + d.previewBtn + '</a>' :
          '<p style="text-align:center;font-size:11px;opacity:.6;margin:0">' + d.publishNote + '</p>') +
      '</div></div>';
    bind();
  }

  function collect() {
    document.querySelectorAll("[data-k]").forEach(function (n) {
      let v = n.value;
      if (n.dataset.k === "eventDate" && v) v = new Date(v).toISOString();
      inv[n.dataset.k] = v;
    });
    inv.program = Array.prototype.map.call(document.querySelectorAll(".prog-edit"), function (r) {
      return { time: r.querySelector(".p-time").value, label: r.querySelector(".p-label").value };
    }).filter(function (p) { return p.time || p.label; });
  }

  function bind() {
    document.querySelectorAll(".tpl-card").forEach(function (b) { b.addEventListener("click", function () { collect(); inv.template = b.dataset.tpl; saved = false; render(); }); });
    document.querySelectorAll(".toggle").forEach(function (b) { b.addEventListener("click", function () { collect(); inv[b.dataset.t] = !inv[b.dataset.t]; saved = false; render(); }); });
    const sel = document.querySelector('[data-k="lang"]');
    if (sel) sel.addEventListener("change", function () { collect(); saved = false; render(); });
    const ap = $("#addProg");
    if (ap) ap.addEventListener("click", function () { collect(); inv.program.push({ time: "", label: "" }); render(); });
    document.querySelectorAll(".p-del").forEach(function (b) { b.addEventListener("click", function () { collect(); inv.program.splice(+b.parentElement.dataset.i, 1); render(); }); });
    $("#save").addEventListener("click", function () {
      collect();
      saved = true;
      history.replaceState(null, "", location.pathname + "#" + App.encode(inv));
      render();
      window.scrollTo(0, document.body.scrollHeight);
    });
    const cl = $("#copyLink");
    if (cl) cl.addEventListener("click", function () { navigator.clipboard.writeText(guestLink()); cl.textContent = "✓"; });
  }

  render();
};

/* ===== لوحة التحكم (الأدمن) — بدون سيرفر ===== */
App.initAdmin = function () {
  const { THEMES, TIERS, LANG_NAMES, $, esc } = App;
  const root = $("#root");

  function loginView() {
    root.innerHTML = '<div class="center-page">' +
      '<div class="seal" style="width:80px;height:80px;font-size:30px;background:rgba(233,192,94,.1);border:1px solid rgba(233,192,94,.4)">🔐</div>' +
      '<h1 class="display gold-text" style="font-size:30px;margin:16px 0 0">لوحة التحكم</h1>' +
      '<p style="font-size:13px;opacity:.6">بطاقتي VIP — الدخول بالرمز السري فقط</p>' +
      '<input id="pw" type="password" placeholder="رمز التحكم" dir="ltr" style="margin-top:22px;max-width:300px;text-align:center;border-radius:99px">' +
      '<button class="btn-gold" id="go" style="max-width:300px;margin-top:14px">دخول</button>' +
      '<p id="err" style="color:#f87171;font-size:13px;margin-top:14px"></p></div>';
    const pw = $("#pw");
    const go = function () {
      if (pw.value.trim() === App.ADMIN_CODE) mainView();
      else $("#err").textContent = "رمز التحكم غير صحيح ❌";
    };
    $("#go").addEventListener("click", go);
    pw.addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });
  }

  function mainView() {
    root.innerHTML = '<div class="edit-wrap" style="max-width:680px">' +
      '<header style="text-align:center;margin-bottom:24px">' +
        '<h1 class="display gold-text" style="font-size:28px;margin:0">لوحة التحكم</h1>' +
        '<p style="font-size:12px;opacity:.6;margin-top:6px">أنشئ دعوة، وأرسل رابط التعديل للزبون — يكتب معلوماته وتصلك على الواتساب</p></header>' +
      '<section class="panel"><h2>➕ إنشاء دعوة جديدة</h2>' +
        '<div class="grid2">' +
          '<label class="field"><span>كود الدعوة (بالإنكليزي، مثل ahmad-shilan)</span><input id="nCode" dir="ltr" placeholder="ahmad-shilan"></label>' +
          '<label class="field"><span>اسم الزبون</span><input id="nName" placeholder="أحمد"></label>' +
          '<label class="field"><span>رقم الزبون (واتساب)</span><input id="nPhone" dir="ltr" placeholder="9647501234567"></label>' +
          '<label class="field"><span>الفئة</span><select id="nTier">' +
            '<option value="vip">VIP 👑 — كل القوالب + موسيقى</option>' +
            '<option value="gold">ذهبية ✨ — ٤ قوالب + موسيقى</option>' +
            '<option value="classic">عادية 🌹 — قالبان</option></select></label>' +
          '<label class="field"><span>القالب الافتراضي</span><select id="nTpl"></select></label>' +
          '<label class="field"><span>لغة الدعوة</span><select id="nLang">' +
            Object.keys(LANG_NAMES).map(function (l) { return '<option value="' + l + '">' + LANG_NAMES[l] + '</option>'; }).join("") + '</select></label>' +
        '</div>' +
        '<button class="btn-gold" id="mk" style="margin-top:16px">أنشئ الدعوة ✨</button>' +
        '<div id="createdBox"></div></section>' +
      '<section class="panel"><h2>💡 طريقة العمل</h2>' +
        '<p style="font-size:13px;line-height:2;opacity:.8">1. أنشئ الدعوة واختر الفئة والقالب<br>2. أرسل <b>رابط التعديل</b> للزبون بزر الواتساب<br>3. الزبون يكتب معلومات حفله ويضغط حفظ — تصلك التفاصيل مع <b>رابط الدعوة النهائي</b> على واتسابك تلقائياً<br>4. الرابط النهائي يوزعه الزبون على ضيوفه — ويقفل تلقائياً بعد الحفل بيومين 🔒</p></section></div>';

    const tplSel = $("#nTpl"), tierSel = $("#nTier");
    function fillTpl() {
      tplSel.innerHTML = TIERS[tierSel.value].templates.map(function (tid) {
        return '<option value="' + tid + '">' + THEMES[tid].emoji + " " + THEMES[tid].names.ar + '</option>';
      }).join("");
    }
    fillTpl();
    tierSel.addEventListener("change", fillTpl);
    $("#mk").addEventListener("click", function () {
      let code = ($("#nCode").value || "").trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
      if (!code) code = "dawat-" + Math.random().toString(36).slice(2, 7);
      const inv = App.newInvite({ code: code, tier: tierSel.value, template: tplSel.value,
        lang: $("#nLang").value, customerName: $("#nName").value });
      const editUrl = location.origin + "/edit/" + code + "#" + App.encode(inv);
      const phone = ($("#nPhone").value || "").replace(/\D/g, "");
      const waTxt = "أهلاً " + ($("#nName").value || "") + " 🤍\nهذا رابط تعديل دعوتك — افتحه واكتب معلومات حفلكم ثم اضغط حفظ:\n" + editUrl + "\n\nبطاقتي VIP ✨";
      $("#createdBox").innerHTML = '<div class="created">' +
        '<p style="color:#34d399;font-weight:700;margin:0 0 10px">✓ تم إنشاء الدعوة «' + esc(code) + '»</p>' +
        '<div class="linkrow"><span>رابط التعديل (للزبون):</span><code dir="ltr">' + editUrl + '</code><button id="cpE">نسخ</button></div>' +
        '<a class="btn-wa" style="margin-top:10px" target="_blank" rel="noreferrer" href="https://wa.me/' + phone + '?text=' + encodeURIComponent(waTxt) + '">أرسل الرابط للزبون 📲</a></div>';
      $("#cpE").addEventListener("click", function () { navigator.clipboard.writeText(editUrl); $("#cpE").textContent = "✓"; });
    });
  }

  loginView();
};

App.initLanding();
</script>
